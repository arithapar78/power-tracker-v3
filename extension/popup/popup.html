<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Power Tracker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       VIEW 1: Dashboard (default)
  ════════════════════════════════════════════════ -->
  <div id="view-dashboard">

    <header class="header">
      <button id="open-optimizer-btn" class="icon-btn" title="Prompt Optimizer">✏️</button>
      <span class="header-title">
        <img src="../assets/icon-32.png" class="header-logo" alt="Power Tracker" />
        Power Tracker
      </span>
      <button id="open-history-btn" class="icon-btn" title="Energy History">📈</button>
    </header>

    <!-- Activity indicator -->
    <section class="card">
      <div class="card-label">Frontend Activity</div>
      <div class="activity-indicator">
        <span class="activity-dot"></span>
        <span class="activity-text">Active</span>
        <!-- TODO: replace with real activity detection -->
      </div>
    </section>

    <!-- Energy in watts -->
    <section class="card card-energy">
      <div class="card-label">Estimated Energy</div>
      <div class="energy-value">… <span class="energy-unit">W</span></div>
      <div id="ai-info" class="ai-info hidden">
        <span id="ai-model-label" class="ai-model-label"></span>
        <span id="ai-watts-label" class="ai-watts-label"></span>
      </div>
    </section>

    <!-- Comparisons -->
    <section class="card">
      <div class="card-label">Equivalent per Hour</div>
      <div class="comparisons">

        <div class="comparison-row">
          <span class="comparison-icon">💡</span>
          <div class="comparison-info">
            <span class="comparison-value bulbs-value">—</span>
            <span class="comparison-label">light bulbs (60 W)</span>
          </div>
        </div>

        <div class="comparison-row">
          <span class="comparison-icon">💧</span>
          <div class="comparison-info">
            <span class="comparison-value water-value">—</span>
            <span class="comparison-label">gallons of water</span>
          </div>
        </div>

        <div class="comparison-row">
          <span class="comparison-icon">🌿</span>
          <div class="comparison-info">
            <span class="comparison-value co2-value">—</span>
            <span class="comparison-label">g CO₂ released</span>
          </div>
        </div>

      </div>
    </section>

  </div><!-- /view-dashboard -->


  <!-- ═══════════════════════════════════════════════
       VIEW 2: Prompt Optimizer
  ════════════════════════════════════════════════ -->
  <div id="view-optimizer" class="hidden">

    <header class="header">
      <button id="back-btn" class="icon-btn" title="Back to Dashboard">←</button>
      <span class="header-title">Prompt Optimizer</span>
    </header>

    <section class="card">
      <div class="card-label">Your Prompt</div>
      <textarea id="original-prompt" placeholder="Enter your prompt..." rows="4"></textarea>
      <div class="token-row">
        <span class="token-label">Tokens:</span>
        <span id="original-tokens" class="token-count">0</span>
      </div>
      <button id="optimize-btn" class="primary-btn">Optimize</button>
    </section>

    <section class="card hidden" id="result-card">
      <div class="card-label">Optimized Prompt</div>
      <div id="optimized-prompt" class="output-text"></div>
      <div class="token-stats">
        <div class="token-stat-row">
          <span class="token-stat-label">Original</span>
          <span id="stat-original" class="token-stat-value">—</span>
        </div>
        <div class="token-stat-row">
          <span class="token-stat-label">Optimized</span>
          <span id="stat-optimized" class="token-stat-value">—</span>
        </div>
        <div class="token-stat-row token-stat-row--saved">
          <span class="token-stat-label">Saved</span>
          <span id="stat-saved" class="token-stat-value token-saved">—</span>
        </div>
      </div>
    </section>

    <div id="status" class="status hidden"></div>

  </div><!-- /view-optimizer -->


  <script src="../lib/prompt-rules-db.js"></script>
  <script src="../lib/token-counter.js"></script>
  <script src="../lib/prompt-generator.js"></script>
  <script src="../lib/energy-estimator.js"></script>
  <script src="../lib/api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
